<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>TODO App</title>

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(135deg, #667eea, #764ba2);
            font-family: 'Poppins', sans-serif;
        }

        .card {
            border-radius: 15px;
        }

        .task-item {
            transition: 0.3s;
        }

        .task-item:hover {
            transform: scale(1.02);
            background-color: #f8f9fa;
        }

        .completed {
            text-decoration: line-through;
            color: gray;
        }
    </style>
</head>

<body>

<div class="container mt-5">

    <!-- Main Card -->
    <div class="card shadow-lg p-4">

        <h2 class="text-center mb-4">✨ TODO Application</h2>

        <!-- Input Section -->
        <form action="/" method="post">
            <div class="input-group input-group-lg mb-3">
                <input type="text"
                       name="title"
                       class="form-control"
                       placeholder="What do you want to do today?"
                       required>
                                 <!-- type="submit" -->
                <button class="btn btn-primary px-4">
                    ➕ Add
                </button>
            </div>
        </form>

        <!-- Task List -->
        <ul class="list-group">

            <li class="list-group-item d-flex justify-content-between align-items-center task-item"
                th:each="task : ${tasks}">

                <!-- Task Title -->

                <span th:text="${task.title}"
                      th:classappend="${task.completed} ? 'completed' : ''">
                </span>

                <!-- Buttons -->
                <div>

                    <!-- Toggle Complete -->


                    <a th:href="@{/{id}/toggle(id=${task.id})}"
                       class="btn btn-sm btn-success">
                        ✔
                    </a>

                    <!-- Delete -->
                   
                    <a th:href="@{/{id}/delete(id=${task.id})}"
                       class="btn btn-sm btn-danger">
                        🗑
                    </a>

                </div>
            </li>

        </ul>

    </div>
</div>

</body>
</html>
